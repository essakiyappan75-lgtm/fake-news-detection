<!DOCTYPE html>
<html>
<head>
<title>Fake News Detection</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
width:500px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#667eea;
color:white;
border:none;
padding:12px 25px;
margin-top:15px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#5563d1;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>📰 Fake News Detection System</h2>

<form action="/predict" method="post">

<textarea name="news" placeholder="Paste news text here..."></textarea>

<br>

<button type="submit">Analyze News</button>

</form>

{% if prediction %}

<div class="result">

<p>{{prediction}}</p>

<p>Confidence: {{confidence}}%</p>

</div>

{% endif %}

</div>

</body>
</html>
